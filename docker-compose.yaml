services:
  app:
    build: .
    command: gunicorn mysite.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/static
      - ./mysite/database:/app/database
    env_file:
      - .env

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - static_volume:/static
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  static_volume:
