services:
  app:
    build: .
    command: sh -c "python manage.py collectstatic --noinput --clear && gunicorn mysite.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_volume:/app/staticfiles
      - ./mysite/database:/app/database
    env_file:
      - .env

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - static_volume:/app/staticfiles
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  static_volume:
